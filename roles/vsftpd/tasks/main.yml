- name: Install vsftpd
  apt:
    name: vsftpd
    state: present
    update_cache: yes

- name: copy config
  copy:
    src: vsftpd.conf
    dest: /etc/vsftpd.conf
  notify: restart vsftpd

- name: varmista vsftpd palvelin on käynnissä
  service:
    name: vsftpd
    state: started
    enabled: yes
